<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slice Transition · Demo</title>
  <link href="https://fonts.loli.net/css2?family=Playfair+Display:wght@800&family=Noto+Serif+SC:wght@800&display=swap" rel="stylesheet" />
  <!-- JS 被禁用时直接隐藏遮罩，避免盖死页面 -->
  <noscript><style>.st-root{display:none!important}</style></noscript>
  <style>
    body { margin:0; min-height:100vh; background:#0b0b12; color:#e8e8ef;
      font-family:system-ui,'Noto Sans SC',sans-serif; display:grid; place-items:center; gap:1.5rem; }
    .card { text-align:center; padding:2rem; }
    h1 { font-family:'Playfair Display',serif; font-size:clamp(2rem,6vw,3.5rem); margin:.2rem 0 1rem; }
    button, a.btn { display:inline-block; margin:.3rem; padding:.7rem 1.3rem; border-radius:9999px; cursor:pointer;
      border:1px solid #6366f1; background:#6366f1; color:#fff; font-weight:700; text-decoration:none; font-size:.9rem; }
    button.ghost { background:transparent; }
    p { color:#9a9aa8; max-width:34rem; line-height:1.7; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Slice Transition</h1>
    <p>页面加载时已自动播放「入场揭幕」。点下面按钮可重播，或体验「页面跳转转场」。</p>
    <button id="replay">重播入场揭幕</button>
    <button id="leave" class="ghost">跳转转场 → 重载本页</button>
  </div>

  <!-- 可选：自带 GSAP；不引也行，模块会按需自动加载 -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="slice-transition.js"></script>
  <script>
    var OPTS = { image: '../../dist/assets/hero-bg.jpg', text: '对话即渲染', slices: 5 };

    // 入场揭幕
    SliceTransition.intro(OPTS);

    document.getElementById('replay').addEventListener('click', function () {
      SliceTransition.intro(OPTS);
    });
    // 跳转转场：盖屏后重载本页（真实场景把 location.href 换成目标页）
    document.getElementById('leave').addEventListener('click', function () {
      SliceTransition.leave(location.href, OPTS);
    });
  </script>
</body>
</html>
